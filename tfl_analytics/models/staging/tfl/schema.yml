version: 2

models:
  - name: stg_tfl_line_statuses
    description: "One row per Tube line per TfL API snapshot."
    columns:
      - name: utc_fetched_at
        description: "UTC timestamp when the TfL API response was fetched."
        data_tests:
          - not_null

      - name: line_id
        description: "TfL line identifier."
        data_tests:
          - not_null

      - name: line_name
        description: "TfL line name."
        data_tests:
          - not_null

      - name: status_description
        description: "Current status description for the line at the time of the snapshot."
        data_tests:
          - not_null
